<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quebra-cabeça"</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>


    <body>

        <h1>Quebra Cabeças</h1>
        <p>Abra o console do navegador para visualizar as tabelas em tempo real</p>

        <p>Para o teste de comparação, foi usado o exemplo citado na declaração do trabalho: (5, 1, 3, 4, 9, 0, 6, 8, 13, 2, 7, 12, 14, 10, 11, 15)</p>

        <div class="grid" id="grid"></div>


        <div class="embaralhar">
            <button onclick="embaralhar()">Embaralhar</button>
            <button onclick="configurarEstadoTeste()">Estado de Teste (Comparativo)</button>
        </div>


        <div class="controls">       
            <button class="btn-solve" onclick="resolver_busca('amplitude')">Busca em Amplitude</button>
            <button class="btn-solve" onclick="resolver_busca('melhor_escolha')">Busca Melhor Escolha</button>        
        </div>

        <div>
            <p id="passos"></p>
            <button class="controls__animacao" onclick="animarSolucao()" id="mensagem">Iniciar solucao</button>
            
        </div>



        <script src="./scripts/puzzle.js"></script>
    </body>




</html>
